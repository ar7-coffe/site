
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Frii-Ondas</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a1225;
    color:white;
    font-family:Arial, sans-serif;
}

/* PRIMEIRA TELA */
.inicio{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.inicio h1{
    font-size:80px;
    color:#4da6ff;
}

.inicio p{
    font-size:28px;
    margin-top:10px;
}

/* SEGUNDA TELA */
.versoes{
    min-height:100vh;
    padding:80px 20px;
    text-align:center;
}

.versoes h2{
    font-size:50px;
    color:#4da6ff;
    margin-bottom:50px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.card{
    background:#15213f;
    border-radius:15px;
    padding:20px;
    width:280px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin-top:15px;
    font-size:24px;
}
</style>

</head>
<body>

<section class="inicio">
    <h1>FRII-ONDAS</h1>
    <p>Nova tecnologia — O frio na velocidade do futuro.</p>
</section>

<section class="versoes">
    <h2>Nossas Versões</h2>

    <div class="cards">

        <div class="card">
            <img src="mini.png" alt="Frii-Ondas Mini">
            <h3>Mini</h3>
        </div>

        <div class="card">
            <img src="family.png" alt="Frii-Ondas Family">
            <h3>Family</h3>
        </div>

        <div class="card">
            <img src="pro.png" alt="Frii-Ondas Pro X">
            <h3>Pro X</h3>
        </div>

    </div>
</section>

</body>
</html>
